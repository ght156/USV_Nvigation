# 实船 mission_bridge + nav_status_aggregator 参数示例
# 用法（在实船 bringup 中 include mission_bridge.launch.py 时）:
#   params_file:=<本文件绝对路径或 install/share/.../mission_stack.example.yaml>
# launch 内联参数（如 odom_topic:=）会覆盖本文件中同名项。
#
# 注意: nav_status_aggregator.odom_topic 由 launch 自动与 mission_bridge.odom_topic 绑定，
#       无需在本文件中为 aggregator 重复写 odom_topic。

mission_bridge:
  ros__parameters:
    map_yaml_path: "/path/to/real_map.yaml"
    odom_topic: "/mavros/local_position/odom"
    global_frame: "map"
    robot_frame: "base_link"
    waypoint_command_mode: "debounce"
    allow_replace_running_mission: false

nav_status_aggregator:
  ros__parameters:
    gps_topic: "/mavros/global_position/raw/fix"
    publish_rate: 2.0
    vehicle_id: "usv_001"
    odom_timeout: 2.0
    gps_timeout: 5.0
    stuck_progress_timeout: 12.0
