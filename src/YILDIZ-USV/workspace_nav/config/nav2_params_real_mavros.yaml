# -----------------------------------------------------------------------------
# 实船 / MAVROS（PX4）用 Nav2 参数（与仿真 nav2_params.yaml 独立）。
# - use_sim_time: false（无 Gazebo /clock）
# - bt_navigator / velocity_smoother 的 odom_topic 指向 MAVROS 局域里程：
#   /mavros/local_position/odom  （PX4 滤波器融合结果，通常已含 GNSS；非「纯手动 GPS 话题」）
# 原始 GNSS 监视：/mavros/global_position/raw/fix 等；与海图对齐仍须令 PX4 HOME / local origin 与
# map.yaml / 队里 datum 约定一致，否则 map 上会有平移偏差。
# 改激光/点云话题、footprint、控制器增益请优先只动本文件，避免影响仿真参数。
# 实机 Livox：local/global 使用 VoxelLayer + PointCloud2（默认话题 /livox/lidar，请用 ros2 topic list 核对）。
#
# 保守试验标定（首次下水）：下列速度与加速度与 workspace_ros nav2_cmd_vel_to_mavros
# 映射输入（max_linear_x 等）同量级，
# 水面惯量大，先小后大；膨胀略放大以留安全余量。完整动力学标定后再逐步放开。
# 控制器频率建议 5~10 Hz、速度/航向加速度限得很小，并放宽朝向容差，减轻水面上的过修正振荡。
# -----------------------------------------------------------------------------
bt_navigator:
  ros__parameters:
    use_sim_time: false 
    global_frame: map
    robot_base_frame: base_link
    odom_topic: "/mavros/local_position/odom"
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    plugin_lib_names: [
      nav2_compute_path_to_pose_action_bt_node, nav2_compute_path_through_poses_action_bt_node,
      nav2_smooth_path_action_bt_node, nav2_follow_path_action_bt_node, nav2_spin_action_bt_node,
      nav2_wait_action_bt_node, nav2_assisted_teleop_action_bt_node, nav2_back_up_action_bt_node,
      nav2_drive_on_heading_bt_node, nav2_clear_costmap_service_bt_node, nav2_is_stuck_condition_bt_node,
      nav2_goal_reached_condition_bt_node, nav2_goal_updated_condition_bt_node, nav2_globally_updated_goal_condition_bt_node,
      nav2_is_path_valid_condition_bt_node, nav2_initial_pose_received_condition_bt_node,
      nav2_reinitialize_global_localization_service_bt_node, nav2_rate_controller_bt_node,
      nav2_distance_controller_bt_node, nav2_speed_controller_bt_node, nav2_truncate_path_action_bt_node,
      nav2_truncate_path_local_action_bt_node, nav2_goal_updater_node_bt_node, nav2_recovery_node_bt_node,
      nav2_pipeline_sequence_bt_node, nav2_round_robin_node_bt_node, nav2_transform_available_condition_bt_node,
      nav2_time_expired_condition_bt_node, nav2_path_expiring_timer_condition, nav2_distance_traveled_condition_bt_node,
      nav2_single_trigger_bt_node, nav2_goal_updated_controller_bt_node, nav2_is_battery_low_condition_bt_node,
      nav2_navigate_through_poses_action_bt_node, nav2_navigate_to_pose_action_bt_node,
      nav2_remove_passed_goals_action_bt_node, nav2_planner_selector_bt_node, nav2_controller_selector_bt_node,
      nav2_goal_checker_selector_bt_node, nav2_controller_cancel_bt_node, nav2_path_longer_on_approach_bt_node,
      nav2_wait_cancel_bt_node, nav2_spin_cancel_bt_node, nav2_back_up_cancel_bt_node,
      nav2_assisted_teleop_cancel_bt_node, nav2_drive_on_heading_cancel_bt_node, nav2_is_battery_charging_condition_bt_node
    ]

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: false 

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: false 

controller_server:
  ros__parameters:
    use_sim_time: false
    # —— 控制器频率 (Hz)。实船建议 5~10 Hz；过高易与水面惯量叠加导致扭动 ——
    controller_frequency: 20.0
    # —— 速度死区：低于此阈值的指令视为零（与 velocity_smoother.deadband_velocity 对齐）——
    min_x_velocity_threshold: 0.05
    min_y_velocity_threshold: 0.05
    min_theta_velocity_threshold: 0.05

    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      # —— 在 movement_time_allowance 秒内至少移动 required_movement_radius 米，否则视为卡住 ——
      required_movement_radius: 0.00001
      movement_time_allowance: 300000.0

    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      # —— 到达判定容差：xy (米) / yaw (弧度)。船体 1.6 m，容差略大于船体半长 ——
      xy_goal_tolerance: 1.5
      yaw_goal_tolerance: 1.0
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      # —— 期望线速度 (m/s)。下水首试偏保守 (0.2)；稳定后可逐步放宽 ——
      desired_linear_vel: 0.5
      # —— 最大角加速度 (rad/s²)。水面惯量大，小值抑制摇头 ——
      max_angular_accel: 2.0
      # —— 是否允许倒车（本船若不能倒车务必 false）——
      allow_reversing: false

      # —— 前视距离 (m)：base_link 距船头 1.4 m，min 须 >1.4 否则 carrot 落在船内 ——
      lookahead_time: 2.0
      use_velocity_scaled_lookahead_dist: true
      min_lookahead_dist: 1.6
      max_lookahead_dist: 3.5

      # —— 速度缩放：弯道自动减速 ——
      use_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_speed: 0.1       # 弯道减速下限 (m/s)
      regulated_linear_scaling_min_radius: 2.0       # 触发减速的转弯半径 (m)，略大于船宽

      # —— 代价缩放：接近高代价区域 (障碍/膨胀) 时自动减速 ——
      use_cost_regulated_linear_velocity_scaling: true
      cost_scaling_dist: 4.0        # 开始减速的代价距离 (m)，≈ 船头前伸 1.4 + 余量 1.1
      cost_scaling_gain: 0.8        # 减速强度 (0~1, 越大越激进)
      inflation_cost_scaling_factor: 1.0

      # —— 接近目标时减速。距离须 ≥ 船头前伸量，否则到达前已全速冲过 ——
      min_approach_linear_velocity: 0.1
      approach_velocity_scaling_dist: 2.0

      # —— 转向控制 ——
      use_rotate_to_heading: false              # 实船水面不建议原地旋转
      rotate_to_heading_angular_vel: 0.12
      # —— 碰撞检测：在 carrot 前 max_allowed_time_to_collision 秒内有障碍则急停 ——
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 2.5
      use_interpolation: true
      transform_tolerance: 0.2
      max_robot_pose_search_dist: 10.0
      
local_costmap:
  local_costmap:
    ros__parameters:
      # —— 更新/发布频率 (Hz)。点云密时 CPU 偏高可适当降低 ——
      update_frequency: 5.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: false
      rolling_window: true
      # —— 窗口尺寸 (米)：宽 20 × 高 15，分辨率 0.05 m/格 ——
      width: 20
      height: 15
      resolution: 0.05
      # —— 船体 footprint (米)：1.6 m 长 × 0.8 m 宽。base_link 在船尾往前 0.2 m，故前向 1.4 m / 后向 0.2 m ——
      footprint: "[[1.4, 0.4], [1.4, -0.4], [-0.2, -0.4], [-0.2, 0.4]]"
      plugins: ["voxel_layer", "inflation_layer"]
      # —— 膨胀层：在障碍物周围生成渐变代价。半径过大会让船绕行过远 ——
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # —— 代价衰减系数：1.0 ≈ 线性衰减；>1 衰减更快（障碍边界更硬）——
        cost_scaling_factor: 1.0
        # —— 膨胀半径 (m)：从障碍物边界向外扩展的距离。
        #    船体半宽 0.4 m + 水面安全余量 ≈ 0.8 m → 设 1.2 m ——
        inflation_radius: 1.2
      # —— Voxel 层：将 3D 点云投影为 2D 障碍标记 ——
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: false
        # —— 发布体素网格 (RViz 可订阅 /local_costmap/voxel_grid 查看) ——
        publish_voxel_map: true
        # —— 体素 z 轴范围：origin_z=-0.5, z_res=0.2, z_voxels=12 → 覆盖 -0.5~1.9 m (相对 base_link) ——
        origin_z: -0.5       # 体素底部 z 坐标 (米, 相对 base_link)
        z_resolution: 0.2    # z 轴分辨率 (米/层)
        z_voxels: 12         # z 轴层数
        max_obstacle_height: 2.0
        # —— 标记阈值：一个体素列中至少 mark_threshold 个点被占据才标为障碍。0=首次点击即标记 (水面杂波多时可增大到 1~2) ——
        mark_threshold: 1
        observation_sources: livox_cloud
        livox_cloud:
          topic: /livox/lidar
          data_type: "PointCloud2"
          # —— clearing: true → 射线穿过区域清除旧障碍 (动态环境需要) ——
          clearing: true
          marking: true
          # —— 障碍距离与高度过滤 ——
          obstacle_min_range: 0.5    # 盲区 (米)，小于此距离的点忽略
          obstacle_max_range: 30.0   # 最大检测距离 (米)
          raytrace_min_range: 0.5
          raytrace_max_range: 35.0   # 射线清除最大距离 (一般比 obstacle_max_range 大一点)
          # —— 障碍高度筛选：低于 min / 高于 max 的点不参与标记。min 设负值可滤除水面波纹 (相对 base_link) ——
          min_obstacle_height: -0.3  # 低于 LiDAR 安装高度 0.3 m 以下的点忽略 (滤水面)
          max_obstacle_height: 2.0   # 高于 2 m 的点忽略 (滤桥梁/树冠)
      always_send_full_costmap: true
      
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: false
      rolling_window: false
      # —— 船体 footprint: 1.6 m × 0.8 m。base_link 在船尾往前 0.2 m，前向 1.4 m / 后向 0.2 m，同 local ——
      footprint: "[[1.4, 0.4], [1.4, -0.4], [-0.2, -0.4], [-0.2, 0.4]]"
      # —— 全局代价地图分辨率 (m/格)。地图本身 1.0 m/px，0.5 已足够精细 ——
      resolution: 0.5
      track_unknown_space: True
      # —— global 挂 voxel_layer 用于远距离障碍预判（max 40m，local 30m）。
      #    注意：非滚动窗口下，动态物（行人/车辆）离开后其标记可能残留（clearing 需要射线穿过旧体素，
      #    动态物走后无新射线穿过原位置则永久残留）。水上动态物少时影响不大；
      #    若岸测/码头出现大量 ghost，可临时删掉 voxel_layer 或设 enabled: false ——
      plugins: ["static_layer", "voxel_layer", "inflation_layer"]
      # —— Voxel 层（全局远距离） ——
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: false
        publish_voxel_map: false
        origin_z: -0.5
        z_resolution: 0.2
        z_voxels: 12
        max_obstacle_height: 2.0
        mark_threshold: 1
        observation_sources: livox_cloud
        livox_cloud:
          topic: /livox/lidar
          data_type: "PointCloud2"
          clearing: true
          marking: true
          obstacle_min_range: 0.5
          obstacle_max_range: 40.0
          raytrace_min_range: 0.5
          raytrace_max_range: 45.0
          min_obstacle_height: -0.3
          max_obstacle_height: 2.0
      # —— 静态地图层 ——
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      # —— 膨胀层 ——
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 1.0
        # —— 全局膨胀半径 (m)。比 local 略大以保守规划；不可过大否则全局路径绕行过度 ——
        inflation_radius: 2.0
      always_send_full_costmap: True
      
map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true

planner_server:
  ros__parameters:
    expected_planner_frequency: 5.0
    use_sim_time: false
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner/SmacPlanner2D"
      # —— 路径终点容差 (m) ——
      tolerance: 0.125
      # —— 代价穿越乘数：>1 时规划器更倾向绕开代价区而非穿越。水面避障建议 2.0~3.0 ——
      cost_travel_multiplier: 2.0
      downsample_costmap: false
      downsampling_factor: 1
      # —— 允许穿越未知区域 (true=允许，false=只有已知空闲可走) ——
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      # —— 最大规划时间 (s)，超时则返回失败 ——
      max_planning_time: 3.0
      smoother:
        max_iterations: 1000
        # —— 平滑权重：w_smooth 越大路径越平滑但可能偏离原始路径；w_data 保持接近原始 ——
        w_smooth: 0.4
        w_data: 0.2
        tolerance: 1.0e-10
        do_refinement: true
        refinement_num: 2
        
        
behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 1.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: map
    local_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    use_sim_time: false

    # —— 恢复行为参数 ——
    simulate_ahead_time: 3.0
    # —— 旋转恢复速度限制 (rad/s) ——
    max_rotational_vel: 1.0
    min_rotational_vel: 0.2
    rotational_acc_lim: 2.0

robot_state_publisher:
  ros__parameters:
    use_sim_time: false
    

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false  
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 50


velocity_smoother:
  ros__parameters:
    use_sim_time: false
    # —— 平滑频率 (Hz)，≥ controller_frequency ——
    smoothing_frequency: 20.0
    scale_velocities: true
    feedback: "CLOSED_LOOP"

    # —— [vx, vy, wz] 速度/加速度限幅，水面惯量大取小值抑制 cmd_vel 抖动 ——
    max_velocity: [0.5, 0.0, 0.5]
    min_velocity: [0.0, 0.0, -0.5]
    # —— 加速度上限 ([ax, ay, awz])。首次下水 0.05 偏保守，稳定后可逐步放大 ——
    max_accel: [0.5, 0.0, 0.5]
    max_decel: [-0.5, 0.0, -0.5]   # 减速度 (<0)

    odom_topic: "/mavros/local_position/odom"
    odom_duration: 0.1
    # —— 速度死区：低于此值输出 0 ——
    deadband_velocity: [0.03, 0.0, 0.03]
    velocity_timeout: 1.0
