# 实船专用（MAVROS：`odom → base_link`）。父帧为 base_link，方能接到 map→odom→base_link。
# 默认平移复制自 usv.xacro 的 fixed joint；真机请按外参标定修改。
static_transforms:
  - parent: "base_link"
    child: "livox_frame"
    translation: [0.2, 0.0, 0.45]
    rotation_rpy: [0.0, 0.0, 0.0]

  - parent: "base_link"
    child: "imu_link"
    translation: [0.325, 0.0, 0.25]
    rotation_rpy: [0.0, 0.0, 0.0]

  - parent: "base_link"
    child: "gps_link"
    translation: [0.325, 0.0, 0.25]
    rotation_rpy: [0.0, 0.0, 0.0]

  - parent: "base_link"
    child: "camera_link"
    translation: [0.25, 0.0, 0.35]
    rotation_rpy: [0.0, 0.0, 0.0]
