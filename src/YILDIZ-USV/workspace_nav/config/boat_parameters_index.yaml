# 船体与导航参数——仓库内文件索引（非运行时加载，仅供查阅）
# 仿真栈说明见 src/YILDIZ-USV/docs/PROJECT_ARCHITECTURE_AND_NAV2.md
# 真机参数与 MAVROS/PX4 相关文件见 USV_NAV 仓库

simulation_urdf_and_gazebo:
  primary_file: workspace_gz/description/roboboat/roboboat.xacro
  contains:
    - base_link 质量/惯量、碰撞几何、外形 mesh
    - base_link_to_*_link 关节（传感器与推进舱杆臂）
    - Gazebo Thruster 插件 thrust_coefficient fluid_density propeller_diameter
    - Gazebo Surface 插件 hull_length hull_radius fluid_level
    - Gazebo SimpleHydrodynamics 阻尼项 xU xUU yV yVV nR nRR 等
  models_assets: workspace_gz/models/roboboat/

nav2_maps:
  simulation_default: workspace_nav/config/map.yaml
  simulation_backup: workspace_nav/config/map.simulation.backup.yaml
  simulation_pgm_backup: workspace_nav/map/map.simulation.backup.pgm

  keys:
    - local_costmap.ros__parameters.footprint
    - global_costmap.ros__parameters.footprint
    - controller_server.ros__parameters.FollowPath

cmd_vel_to_thrusters_sim:
  converter: workspace_ros/scripts/converter.py
  manual_keyboard: workspace_ros/scripts/manual_control.py

sensor_tf:
  simulation: workspace_ros/config/static_transform.yaml

localization_frames:
  ekf: workspace_ros/config/ekf.yaml
  navsat: workspace_ros/config/navsat.yaml

optional_mavros_overlay_for_hil:
  note: >-
    仅当在仿真外接 MAVROS 做对比或 HIL 时使用；合并层为
    workspace_nav/config/nav2_mavros_odom_overlay.yaml（launch 参数 use_mavros_odometry）。
  upstream_real_boat_launch_and_configs: USV_NAV 仓库
