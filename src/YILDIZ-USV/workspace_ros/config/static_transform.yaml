# 仿真与 localization.launch.py 默认：与 Gazebo/URDF 传感器 frame 约定配套
# （lidar_link → roboboat/base_link/sensor_*）。实船静态 TF 见 USV_NAV 仓库。
static_transforms:
  - parent: "lidar_link"
    child: "roboboat/base_link/sensor_lidar"
    translation: [0.0, 0.0, 0.0]
    rotation_rpy: [0.0, 0.0, 0.0]

  - parent: "imu_link"
    child: "roboboat/base_link/sensor_imu"
    translation: [0.0, 0.0, 0.0]
    rotation_rpy: [0.0, 0.0, 0.0]

  - parent: "gps_link"
    child: "roboboat/base_link/sensor_gps"
    translation: [0.0, 0.0, 0.0]
    rotation_rpy: [0.0, 0.0, 0.0]

  - parent: "camera_link"
    child: "roboboat/base_link/sensor_camera"
    translation: [0.0, 0.0, 0.0]
    rotation_rpy: [0.0, 0.0, 0.0]
